name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python {{ cookiecutter.python_version }}
        run: uv python install {{ cookiecutter.python_version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Run unit tests
        run: uv run pytest -v -m unit
        # Integration tests are excluded from CI by default.
        # Add a separate job with service containers when you're ready.
